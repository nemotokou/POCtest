<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>申請詳細</title>

<style>
:root { 
  --primary-color: #0078d4; 
  --success-color: #107c10; 
  --bg-color: #f3f2f1; 
  --border-color: #edebe9; 
}

body { 
  font-family: "Segoe UI", "Meiryo", sans-serif; 
  background-color: var(--bg-color); 
  padding: 20px; 
  color: #323130; 
}

.container { 
  max-width: 850px; 
  margin: 0 auto; 
  background: #fff; 
  padding: 30px; 
  border-radius: 4px; 
}

h1 { 
  border-bottom: 2px solid var(--primary-color); 
  padding-bottom: 10px; 
  font-size: 1.4rem; 
  margin-bottom: 25px; 
}

/* 進捗表示 */
.status-box {
  margin-bottom: 25px;
  padding: 15px;
  border: 1px solid var(--border-color);
  background: #faf9f8;
}

.status-title {
  font-weight: bold;
  margin-bottom: 10px;
}

.status-steps {
  display: flex;
  align-items: center;
  gap: 10px;
}

.step {
  padding: 8px 12px;
  border-radius: 20px;
  font-size: 0.85rem;
  border: 1px solid #ccc;
  background: #fff;
}

.step.active {
  background: #0078d4;
  color: #fff;
  border: none;
}

.step.reject {
  background: #d13438;
  color: #fff;
  border: none;
}

/* 🔥 ここが重要：shinseiのconfirm-table風に統一 */
.detail-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

.detail-table th {
  width: 30%;
  text-align: left;
  padding: 12px;
  background: #faf9f8;
  border: 1px solid var(--border-color);
  font-weight: bold;
  font-size: 0.9rem;
}

.detail-table td {
  padding: 12px;
  border: 1px solid var(--border-color);
  background: #fff;
  font-size: 0.95rem;
}

/* ボタンエリア（shinseiと統一） */
.btn-area {
  display: flex;
  gap: 15px;
  margin-top: 30px;
}

.btn {
  padding: 12px 30px;
  border: none;
  border-radius: 2px;
  font-weight: bold;
  cursor: pointer;
  flex: 1;
  font-size: 1rem;
}

.btn-back {
  background-color: #f3f2f1;
  color: #323130;
  border: 1px solid #8a8886;
}

.btn:hover { 
  opacity: 0.8; 
}
</style>
</head>

<body>

<div class="container">
  <h1>申請詳細</h1>

  <div id="statusArea"></div>

  <div id="detail">読み込み中...</div>

  <div class="btn-area">
    <button class="btn btn-back" onclick="history.back()">← 一覧に戻る</button>
  </div>
</div>

<script>

function getQueryParam(name) {
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

function formatDate(dt) {
  if (!dt) return "";
  return new Date(dt).toLocaleString();
}

function convertKubun(k) {
  switch (Number(k)) {
    case 1: return "新規案件";
    case 2: return "変更申請";
    case 3: return "費用精算";
    default: return k;
  }
}

function convertJokyoFlag(j) {
  switch (Number(j)) {
    case 1: return "新規申請（リーダー承認待ち）";
    case 2: return "リーダー差戻し";
    case 3: return "リーダー承認済み（管理者承認待ち）";
    case 4: return "幹部差戻し";
    case 5: return "幹部承認済み";
    default: return j;
  }
}

async function loadDetail() {
  const no = getQueryParam("no");

  if (!no) {
    document.getElementById("detail").innerHTML = "申請番号がないよ〜";
    return;
  }

  try {
    const res = await fetch("https://prod-27.northcentralus.logic.azure.com:443/workflows/2b63d280b7f744ecbfc59d115bc5e73d/triggers/When_an_HTTP_request_is_received/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2FWhen_an_HTTP_request_is_received%2Frun&sv=1.0&sig=X6dMCvTZslrBF6AXS7YWY2LfQ0Anr_3ly_gKnrcB6Zk", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ no: no })
    });

    const data = await res.json();
    const item = data[0];

    if (!item) {
      document.getElementById("detail").innerHTML = "データが見つからないよ〜";
      return;
    }

    document.getElementById("detail").innerHTML = `
      <table class="detail-table">
        <tr><th>申請番号</th><td>${item.SHINSEIBANGOU}</td></tr>
        <tr><th>申請者名</th><td>${item.SHINSEISYAMEI}</td></tr>
        <tr><th>メール</th><td>${item.MAILADDRESS}</td></tr>
        <tr><th>部署</th><td>${item.BUSHOMEI}</td></tr>
        <tr><th>区分</th><td>${convertKubun(item.KUBUN)}</td></tr>
        <tr><th>プロジェクト</th><td>${item.PROJECT}</td></tr>
        <tr><th>一次請負</th><td>${item.ICHIJIUKE || ""}</td></tr>
        <tr><th>電話番号</th><td>${item.RENRAKUSAKI}</td></tr>
        <tr><th>承認者(リーダー)</th><td>${item.SYOUNINLEADER}</td></tr>
        <tr><th>承認者(幹部)</th><td>${item.SYOUNINKANBU}</td></tr>
        <tr><th>連絡事項</th><td>${item.RENRAKUJIKOU || ""}</td></tr>
        <tr><th>添付ファイル</th><td>${item.TEMPFILE || ""}</td></tr>
        <tr><th>状態</th><td>${convertJokyoFlag(item.JOKYOFLAG)}</td></tr>
        <tr><th>申請日時</th><td>${formatDate(item.SINSEINICHIJI)}</td></tr>
        <tr><th>更新日時</th><td>${formatDate(item.KOUSHINNICHIJI)}</td></tr>
      </table>
    `;

  } catch (err) {
    console.error(err);
    document.getElementById("detail").innerHTML = "エラーだよ〜";
  }


  // ★ステータス描画
  let step1 = "";
  let step2 = "② 承認待ち";
  let step3 = "③ 承認待ち";
  let step4 = "④ 完了";

  let class1 = "step";
  let class2 = "step";
  let class3 = "step";
  let class4 = "step";

  switch (Number(item.JOKYOFLAG)) {
    case 1:
      class1 += " active";
      break;

    case 2:
      class1 += " active";
      class2 += " reject";
      step2 = "② リーダー差戻し";
      break;

    case 3:
      class1 += " active";
      class2 += " active";
      step2 = "② リーダー承認済み";
      break;

    case 4:
      class1 += " active";
      class2 += " active";
      step2 = "② リーダー承認済み";
      class3 += " reject";
      step3 = "③ 幹部差戻し";
      break;

    case 5:
      class1 += " active";
      class2 += " active";
      step2 = "② リーダー承認済み";
      class3 += " active";
      step3 = "③ 幹部承認済み";
      class4 += " active";
      break;
  }

  document.getElementById("statusArea").innerHTML = `
    <div class="status-box">
      <div class="status-title">申請番号：${item.SHINSEIBANGOU}</div>
      <div class="status-steps">
        <div class="${class1}">① 申請</div>
        <div class="${class2}">${step2}</div>
        <div class="${class3}">${step3}</div>
        <div class="${class4}">${step4}</div>
      </div>
    </div>
  `;
}

loadDetail();

</script>

</body>
</html>
