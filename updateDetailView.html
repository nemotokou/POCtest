<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>申請詳細（承認用）</title>

<style>
:root { 
  --primary-color: #0078d4; 
  --success-color: #107c10; 
  --bg-color: #f3f2f1; 
  --border-color: #edebe9; 
}

body { 
  font-family: "Segoe UI", "Meiryo", sans-serif; 
  background-color: var(--bg-color); 
  padding: 20px; 
  color: #323130; 
}

.container { 
  max-width: 850px; 
  margin: 0 auto; 
  background: #fff; 
  padding: 30px; 
  border-radius: 4px; 
}

h1 { 
  border-bottom: 2px solid var(--primary-color); 
  padding-bottom: 10px; 
  font-size: 1.4rem; 
  margin-bottom: 25px; 
}

/* 進捗表示 */
.status-box {
  margin-bottom: 25px;
  padding: 15px;
  border: 1px solid var(--border-color);
  background: #faf9f8;
}

.status-title {
  font-weight: bold;
  margin-bottom: 10px;
}

.status-steps {
  display: flex;
  align-items: center;
  gap: 10px;
}

.progress-track {
  display: flex;
  justify-content: space-between;
  margin-bottom: 40px;
  position: relative;
}

.progress-track::before {
  content: '';
  position: absolute;
  top: 15px;
  left: 0;
  right: 0;
  height: 2px;
  background: #c8c6c4;
  z-index: 1;
}


.step {
  position: relative;
  z-index: 2;
  text-align: center;
  width: 25%;
  background: none;
  border: none;
}


.step-icon {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid #c8c6c4;
  margin: 0 auto 10px;
  line-height: 30px;
  font-weight: bold;
  color: #8a8886;
}

.step.active .step-icon {
  background: #0078d4;
  color: white;
  border-color: #0078d4;
}

.step.complete .step-icon {
  background: #107c10;
  color: white;
  border-color: #107c10;
}

.step.complete .step-icon::after {
  content: '✔';
}

.step.reject .step-icon {
  background: #d13438;
  color: white;
  border-color: #d13438;
}


/*
.step-label {
  font-size: 0.8rem;
  font-weight: bold;
  color: #605e5c;
}
*/

.step-label {
  margin-top: 0;
  font-size: 0.9rem;
}


/* shinseiのconfirm-table風に統一 */
.detail-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

.detail-table th {
  width: 30%;
  text-align: left;
  padding: 12px;
  background: #faf9f8;
  border: 1px solid var(--border-color);
  font-weight: bold;
  font-size: 0.9rem;
}

.detail-table td {
  padding: 12px;
  border: 1px solid var(--border-color);
  background: #fff;
  font-size: 0.95rem;
}

/* ボタンエリア（shinseiと統一） */
.btn-area {
  display: flex;
  gap: 15px;
  margin-top: 30px;
}

.btn {
  padding: 12px 30px;
  border: none;
  border-radius: 2px;
  font-weight: bold;
  cursor: pointer;
  flex: 1;
  font-size: 1rem;
}

.btn-back {
  background-color: #f3f2f1;
  color: #323130;
  border: 1px solid #8a8886;
}

.btn:hover { 
  opacity: 0.8; 
}
</style>
</head>

<body>

<div class="container">
  <h1>申請詳細（承認用）</h1>

<div id="statusArea">
  <p>申請番号：<span id="displayId">読み込み中...</span></p>

  <div class="progress-track">
    <div id="step1" class="step">
      <div class="step-icon">1</div>
      <div class="step-label">申請済み</div>
    </div>
    <div id="step2" class="step">
      <div class="step-icon">2</div>
      <div class="step-label">リーダ承認待ち</div>
    </div>
    <div id="step3" class="step">
      <div class="step-icon">3</div>
      <div class="step-label">幹部承認待ち</div>
    </div>
    <div id="step4" class="step">
      <div class="step-icon">4</div>
      <div class="step-label">完了</div>
    </div>
  </div>
</div>

  <div id="detail">読み込み中...</div>

  <div class="btn-area">
    <button class="btn btn-back" onclick="history.back()">← 一覧に戻る</button>
    <button class="btn" onclick="approve()">承認</button>
    <button class="btn" onclick="reject()">差戻し</button>
  </div>
</div>

<script>

const UPDATE_URL = "https://prod-10.northcentralus.logic.azure.com:443/workflows/4a63114e0ee64548a944dd09ebd4f8ba/triggers/When_an_HTTP_request_is_received/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2FWhen_an_HTTP_request_is_received%2Frun&sv=1.0&sig=DUul2Fqx4SwVZOSCnxXcjsPAU0CQpYsIFIC_UJ_QGVE";

async function approve() {
  await sendUpdate(2);
}

async function reject() {
  await sendUpdate(1);
}

async function sendUpdate(addValue) {
  const no = getQueryParam("no");
  const renraku = document.getElementById("renrakuInput").value;

  try {
    // 今のデータ再取得（JOKYOFLAG使うため）
    const res = await fetch("https://prod-27.northcentralus.logic.azure.com:443/workflows/2b63d280b7f744ecbfc59d115bc5e73d/triggers/When_an_HTTP_request_is_received/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2FWhen_an_HTTP_request_is_received%2Frun&sv=1.0&sig=X6dMCvTZslrBF6AXS7YWY2LfQ0Anr_3ly_gKnrcB6Zk", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ no: no })
    });

    const data = await res.json();
    const item = data[0];

    const newFlag = Number(item.JOKYOFLAG) + addValue;

    // 更新API呼び出し
    await fetch(UPDATE_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        SHINSEIBANGOU: no,
        RENRAKUJIKOU: renraku,
        JOKYOFLAG: newFlag
      })
    });

    alert("承認しました");
    history.back();

  } catch (e) {
    console.error(e);
    alert("承認エラー");
  }
}


function getQueryParam(name) {
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

function formatDate(dt) {
  if (!dt) return "";
  return new Date(dt).toLocaleString();
}

function convertKubun(k) {
  switch (Number(k)) {
    case 1: return "新規案件";
    case 2: return "変更申請";
    case 3: return "費用精算";
    default: return k;
  }
}

function convertJokyoFlag(j) {
  switch (Number(j)) {
    case 1: return "新規申請（リーダー承認待ち）";
    case 2: return "リーダー差戻し";
    case 3: return "リーダー承認済み（幹部承認待ち）";
    case 4: return "幹部差戻し";
    case 5: return "幹部承認済み";
    default: return j;
  }
}

async function loadDetail() {
  const no = getQueryParam("no");

  if (!no) {
    document.getElementById("detail").innerHTML = "申請番号エラー";
    return;
  }

  try {
    const res = await fetch("https://prod-27.northcentralus.logic.azure.com:443/workflows/2b63d280b7f744ecbfc59d115bc5e73d/triggers/When_an_HTTP_request_is_received/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2FWhen_an_HTTP_request_is_received%2Frun&sv=1.0&sig=X6dMCvTZslrBF6AXS7YWY2LfQ0Anr_3ly_gKnrcB6Zk", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ no: no })
    });

    const data = await res.json();
    const item = data[0];

    if (!item) {
      document.getElementById("detail").innerHTML = "申請情報が見つかりません";
      return;
    }

  // ★ステータス描画
// ★進捗バー更新
document.getElementById("displayId").innerText = item.SHINSEIBANGOU;

// JOKYOFLAG → ステップ番号に変換
let currentStep = 1;

switch (Number(item.JOKYOFLAG)) {
  case 1: currentStep = 2; break; // リーダー待ち
  case 2: currentStep = 2; break; // 差戻し
  case 3: currentStep = 3; break;
  case 4: currentStep = 3; break;
  case 5: currentStep = 4; break;
}

// ステップ反映
for (let i = 1; i <= 4; i++) {
  const el = document.getElementById(`step${i}`);

  // 初期化
  el.classList.remove("active", "complete", "reject");

  const flag = Number(item.JOKYOFLAG);

  // 差戻しは特別扱い
  if (flag == 2 && i == 2) {
    el.classList.add("reject");
    break;
  }
  if (flag == 4 && i == 3) {
    el.classList.add("reject");
    break;
  }

  // 通過済み
  if (i < currentStep) {
    el.classList.add("complete");
  }
  // 現在
  else if (i === currentStep) {
    el.classList.add("active");
  }
}

// 差戻しのラベル変更
if (item.JOKYOFLAG == 2) {
  document.querySelector("#step2 .step-label").innerText = "リーダー差戻し";
}
if (item.JOKYOFLAG == 4) {
  document.querySelector("#step3 .step-label").innerText = "幹部差戻し";
}
if (item.JOKYOFLAG >= 3) {
  document.querySelector("#step2 .step-label").innerText = "リーダー承認済み";
}
if (item.JOKYOFLAG == 5) {
  document.querySelector("#step3 .step-label").innerText = "幹部承認済み";
}


    document.getElementById("detail").innerHTML = `
      <table class="detail-table">
        <tr><th>申請番号</th><td>${item.SHINSEIBANGOU}</td></tr>
        <tr><th>申請者名</th><td>${item.SHINSEISYAMEI}</td></tr>
        <tr><th>メール</th><td>${item.MAILADDRESS}</td></tr>
        <tr><th>部署</th><td>${item.BUSHOMEI}</td></tr>
        <tr><th>区分</th><td>${convertKubun(item.KUBUN)}</td></tr>
        <tr><th>プロジェクト</th><td>${item.PROJECT}</td></tr>
        <tr><th>一次請負</th><td>${item.ICHIJIUKE || ""}</td></tr>
        <tr><th>電話番号</th><td>${item.RENRAKUSAKI}</td></tr>
        <tr><th>承認者(リーダー)</th><td>${item.SYOUNINLEADER}</td></tr>
        <tr><th>承認者(幹部)</th><td>${item.SYOUNINKANBU}</td></tr>
        <tr>
          <th>連絡事項</th>
          <td>
            <textarea id="renrakuInput" style="width:100%; height:80px;">${item.RENRAKUJIKOU || ""}</textarea>
          </td>
        </tr>
        <tr><th>添付ファイル</th><td>${item.TEMPFILE || ""}</td></tr>
        <tr><th>状態</th><td>${convertJokyoFlag(item.JOKYOFLAG)}</td></tr>
        <tr><th>申請日時</th><td>${formatDate(item.SINSEINICHIJI)}</td></tr>
        <tr><th>更新日時</th><td>${formatDate(item.KOUSHINNICHIJI)}</td></tr>
      </table>
    `;

  } catch (err) {
    console.error(err);
    document.getElementById("detail").innerHTML = "申請情報更新エラー";
  }
}

loadDetail();

</script>

</body>
</html>
