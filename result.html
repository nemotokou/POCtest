<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>申請結果</title>
<style>
body {
  font-family: "Segoe UI", "Meiryo", sans-serif;
  background-color: #f3f2f1;
  padding: 40px;
  text-align: center;
}
.container {
  background: #fff;
  padding: 40px;
  border-radius: 4px;
  max-width: 600px;
  margin: auto;
}
h1 {
  margin-bottom: 30px;
}
.btn {
  padding: 12px 30px;
  background-color: #0078d4;
  color: white;
  text-decoration: none;
  border-radius: 4px;
  display: inline-block;
}
</style>
</head>
<body>

<div class="container">
  <h1 id="message"></h1>

  <a class="btn" href="https://happy-sky-0167e2700.7.azurestaticapps.net/shinsei.html">
    ワークフロー申請（入力）へ戻る
  </a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const status = params.get("status");

const message = document.getElementById("message");

if (status === "success") {
  message.textContent = "申請処理が正常終了しました";
} else {
  message.textContent = "申請処理が異常終了しました";
}
</script>

</body>
</html>
