<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ワークフロー申請フォーム</title>
<style>
:root { --primary-color: #0078d4; --success-color: #107c10; --bg-color: #f3f2f1; --border-color: #edebe9; }
body { font-family: "Segoe UI", "Meiryo", sans-serif; background-color: var(--bg-color); padding: 20px; color: #323130; }
.container { max-width: 850px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 4px; }
h1 { border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; font-size: 1.4rem; margin-bottom: 25px; }
.form-group { margin-bottom: 15px; }
label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
input, select, textarea { width: 100%; padding: 10px; border: 1px solid #8a8886; border-radius: 2px; box-sizing: border-box; font-size: 1rem; }
.required::after { content: " *"; color: #a4262c; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.confirm-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
.confirm-table th { width: 30%; text-align: left; padding: 12px; background: #faf9f8; border: 1px solid var(--border-color); }
.confirm-table td { padding: 12px; border: 1px solid var(--border-color); background: #fff; }
#confirmSection { display: none; }
.btn-area { display: flex; gap: 15px; margin-top: 30px; }
.btn { padding: 12px 30px; border: none; border-radius: 2px; font-weight: bold; cursor: pointer; flex: 1; font-size: 1rem; }
.btn-next { background-color: var(--primary-color); color: white; }
.btn-edit { background-color: #f3f2f1; color: #323130; border: 1px solid #8a8886; }
.btn-submit { background-color: var(--success-color); color: white; }
.btn:hover { opacity: 0.8; }
.btn:disabled { background-color: #c8c6c4; cursor: not-allowed; }
</style>
</head>
<body>

<div class="container">
  <!-- 入力画面 -->
  <div id="inputSection">
    <h1>ワークフロー申請（入力）</h1>
    <form id="mainForm">

    <div class="grid">
      <div class="form-group">
        <label>申請番号（自動採番）</label>
        <input type="text" id="shinseiNoPreview" disabled value="自動採番されます">
      </div>
      <div class="form-group">
        <label>申請日時（自動入力）</label>
        <input type="text" id="datePreview" disabled>
      </div>
    </div>

      <div class="grid">
        <div class="form-group">
          <label class="required" for="applicantName">申請者名</label>
          <input type="text" id="applicantName" name="applicantName" data-label="申請者名" required>
        </div>
        <div class="form-group">
          <label class="required" for="email">メールアドレス</label>
          <input type="email" id="email" name="email" data-label="メールアドレス" required>
        </div>
      </div>


  <div class="grid">
    <div class="form-group">
      <label class="required" for="department">所属部署名</label>
      <input type="text" id="department" name="department" data-label="所属部署名" required>
    </div>
    <div class="form-group">
      <label class="required" for="category">申請区分</label>
      <select id="category" name="category" data-label="申請区分" required>
        <option value="">選択してください</option>
        <option value="1">新規案件</option>
        <option value="2">変更申請</option>
        <option value="3">費用精算</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label class="required" for="projectName">プロジェクト名</label>
    <input type="text" id="projectName" name="projectName" data-label="プロジェクト名" required>
  </div>

  <div class="grid">
    <div class="form-group">
      <label for="contractor">一次請負会社</label>
      <input type="text" id="contractor" name="contractor" data-label="一次請負会社">
    </div>
    <div class="form-group">
      <label class="required" for="tel">連絡先電話番号</label>
      <input type="tel" id="tel" name="tel" data-label="連絡先電話番号" required>
    </div>
  </div>

  <div class="grid">
    <div class="form-group">
      <label class="required" for="approverLeader">承認者（リーダ）</label>
      <input type="text" id="approverLeader" name="approverLeader" data-label="承認者（リーダ）" required>
    </div>
    <div class="form-group">
      <label class="required" for="approverManager">承認者（幹部）</label>
      <input type="text" id="approverManager" name="approverManager" data-label="承認者（幹部）" required>
    </div>
  </div>

  <div class="form-group">
    <label for="notes">連絡事項</label>
    <textarea id="notes" name="notes" rows="4" data-label="連絡事項"></textarea>
  </div>

  <div class="form-group">
    <label for="fileInput">添付ファイル</label>
    <input type="file" id="fileInput">
  </div>

  <input type="hidden" name="fileName" id="fileNameInput" value="なし">
  <input type="hidden" name="JOKYOFLAG" value="1">

  <div class="btn-area">
    <button type="button" class="btn btn-next" onclick="toConfirmMode()">入力内容を確認する</button>
    <button type="submit" class="btn btn-submit">確定して申請</button>
  </div>
</form>


  </div>

  <!-- 確認画面 -->

  <div id="confirmSection">
    <h1>申請内容の最終確認</h1>
    <div id="confirmDataDisplay"></div>
    <div class="btn-area">
      <button type="button" class="btn btn-edit" onclick="toInputMode()">← 修正する</button>
      <button type="submit" form="mainForm" class="btn btn-submit">確定して申請</button>
    </div>
  </div>
</div>

<script>
window.addEventListener("load", () => {
  const now = new Date();
  document.getElementById("datePreview").value =
    now.toLocaleString();
});


function toConfirmMode() {
  const form = document.getElementById('mainForm');
  if (!form.reportValidity()) return;

  // ファイル名セット
  const fileInput = document.getElementById('fileInput');
  document.getElementById('fileNameInput').value =
    fileInput.files.length > 0 ? fileInput.files[0].name : 'なし';

  const displayArea = document.getElementById('confirmDataDisplay');

  // 表示対象だけ定義
  const displayFields = [
    { label: "申請者名", key: "applicantName" },
    { label: "メールアドレス", key: "email" },
    { label: "所属部署名", key: "department" },
    { label: "申請区分", key: "category", isSelect: true },
    { label: "プロジェクト名", key: "projectName" },
    { label: "一次請負会社", key: "contractor" },
    { label: "連絡先電話番号", key: "tel" },
    { label: "承認者（リーダ）", key: "approverLeader" },
    { label: "承認者（幹部）", key: "approverManager" },
    { label: "連絡事項", key: "notes" },
    { label: "添付ファイル", key: "fileName" }
  ];

  let html = '<table class="confirm-table">';

  // ①申請番号（表示のみ）
  html += `<tr><th>申請番号</th><td>（自動採番）</td></tr>`;

  // ①申請日時
  html += `<tr><th>申請日時</th><td>${document.getElementById("datePreview").value}</td></tr>`;

  // 各項目
  displayFields.forEach(field => {
    let value = form[field.key]?.value || 'なし';

    // ② selectは表示文字に変換
    if (field.isSelect) {
      const select = form[field.key];
      value = select.options[select.selectedIndex].text;
    }

    html += `<tr><th>${field.label}</th><td>${value.replace(/\n/g,'<br>')}</td></tr>`;
  });

  html += '</table>';

  displayArea.innerHTML = html;

  // 画面切替
  document.getElementById('inputSection').style.display = 'none';
  document.getElementById('confirmSection').style.display = 'block';
  window.scrollTo(0,0);
}


function toInputMode() {
  document.getElementById('confirmSection').style.display = 'none';
  document.getElementById('inputSection').style.display = 'block';
  window.scrollTo(0,0);
}

// Logic AppへPOST送信
document.getElementById("mainForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const formData = new FormData(e.target);
  const data = {};

  formData.forEach((value, key) => {
    data[key] = value;
  });

  try {
    const res = await fetch("https://prod-00.northcentralus.logic.azure.com:443/workflows/905d604fdd334accb3602a9161315372/triggers/When_an_HTTP_request_is_received/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2FWhen_an_HTTP_request_is_received%2Frun&sv=1.0&sig=FNcE-ewZws-Dh6opG7bRRd8FF1yi2YiwQNMxQxtJYT8", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });


const raw = await res.text();

let result;

try {
  result = JSON.parse(raw);
} catch (e) {
  window.location.href = "result.html?status=error";
  return;
}

if (result?.status === "success") {
  window.location.href = "result.html?status=success";
} else {
  window.location.href = "result.html?status=error";
}


  } catch (err) {
    console.error(err);
    alert("通信エラー");
  }
});
</script>

</body>
</html>
