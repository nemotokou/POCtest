<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ワークフロー申請フォーム</title>

<style>
:root { --primary-color: #0078d4; --success-color: #107c10; --bg-color: #f3f2f1; --border-color: #edebe9; }
body { font-family: "Segoe UI", "Meiryo", sans-serif; background-color: var(--bg-color); padding: 20px; color: #323130; }
.container { max-width: 850px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 4px; }
h1 { border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; font-size: 1.4rem; margin-bottom: 25px; }
.form-group { margin-bottom: 15px; }
label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
input, select, textarea { width: 100%; padding: 10px; border: 1px solid #8a8886; border-radius: 2px; box-sizing: border-box; font-size: 1rem; }
.required::after { content: " *"; color: #a4262c; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.confirm-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
.confirm-table th { width: 30%; text-align: left; padding: 12px; background: #faf9f8; border: 1px solid var(--border-color); }
.confirm-table td { padding: 12px; border: 1px solid var(--border-color); background: #fff; }
#confirmSection { display: none; }
.btn-area { display: flex; gap: 15px; margin-top: 30px; }
.btn { padding: 12px 30px; border: none; border-radius: 2px; font-weight: bold; cursor: pointer; flex: 1; font-size: 1rem; }
.btn-next { background-color: var(--primary-color); color: white; }
.btn-edit { background-color: #f3f2f1; color: #323130; border: 1px solid #8a8886; }
.btn-submit { background-color: var(--success-color); color: white; }
.btn:hover { opacity: 0.8; }
.btn:disabled { background-color: #c8c6c4; cursor: not-allowed; }
</style>
</head>

<body>

<div class="container">

  <!-- 入力画面 -->
  <div id="inputSection">
    <h1>ワークフロー申請（入力）</h1>

    <form id="mainForm">

      <div class="grid">
        <div class="form-group">
          <label>申請番号（自動採番）</label>
          <input type="text" id="shinseiNoPreview" disabled value="自動採番されます">
        </div>

        <div class="form-group">
          <label>申請日時（自動入力）</label>
          <input type="text" id="datePreview" disabled>
        </div>
      </div>

      <div class="grid">
        <div class="form-group">
          <label class="required">申請者名</label>
          <input type="text" name="applicantName" required>
        </div>

        <div class="form-group">
          <label class="required">メールアドレス</label>
          <input type="email" name="email" required>
        </div>
      </div>

      <div class="grid">
        <div class="form-group">
          <label class="required">所属部署名</label>
          <input type="text" name="department" required>
        </div>

        <div class="form-group">
          <label class="required">申請区分</label>
          <select name="category" required>
            <option value="">選択してください</option>
            <option value="1">新規案件</option>
            <option value="2">変更申請</option>
            <option value="3">費用精算</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="required">プロジェクト名</label>
        <input type="text" name="projectName" required>
      </div>

      <div class="grid">
        <div class="form-group">
          <label>一次請負会社</label>
          <input type="text" name="contractor">
        </div>

        <div class="form-group">
          <label class="required">連絡先電話番号</label>
          <input type="tel" name="tel" required>
        </div>
      </div>

      <div class="grid">
        <div class="form-group">
          <label class="required">承認者（リーダ）</label>
          <input type="text" name="approverLeader" required>
        </div>

        <div class="form-group">
          <label class="required">承認者（幹部）</label>
          <input type="text" name="approverManager" required>
        </div>
      </div>

      <div class="form-group">
        <label>連絡事項</label>
        <textarea name="notes"></textarea>
      </div>

      <div class="form-group">
        <label>添付ファイル名</label>
        <input type="text" name="fileName" value="なし">
      </div>

      <div class="btn-area">
        <button type="button" class="btn btn-next" onclick="toConfirmMode()">入力内容を確認する</button>
        <button type="submit" class="btn btn-submit">確定して申請</button>
      </div>

    </form>
  </div>

</div>

<script>

// 日時表示
window.addEventListener("load", () => {
  document.getElementById("datePreview").value = new Date().toLocaleString();
});

// 確認画面
function toConfirmMode() {
  const form = document.getElementById('mainForm');
  if (!form.reportValidity()) return;

  const fileInput = document.getElementById('fileInput');
  if (fileInput) {
    document.getElementById('fileNameInput').value =
      fileInput.files.length > 0 ? fileInput.files[0].name : 'なし';
  }

  const displayArea = document.getElementById('confirmDataDisplay');
  const elements = form.querySelectorAll('input, select, textarea');

  let html = '<table class="confirm-table">';
  elements.forEach(el => {
    if (el.type === 'file') return;
    const label = el.getAttribute('data-label') || el.name;
    const value = el.value || 'なし';
    html += `<tr><th>${label}</th><td>${value.replace(/\n/g,'<br>')}</td></tr>`;
  });
  html += '</table>';

  displayArea.innerHTML = html;

  document.getElementById('inputSection').style.display = 'none';
  document.getElementById('confirmSection').style.display = 'block';
}

// 戻る
function toInputMode() {
  document.getElementById('confirmSection').style.display = 'none';
  document.getElementById('inputSection').style.display = 'block';
}

// ===================================================
// 🚀 ⑦ 最終版（実務デバッグ完全版）
// ===================================================
document.getElementById("mainForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const formData = new FormData(e.target);
  const data = {};

  formData.forEach((value, key) => {
    data[key] = value;
  });

  const url = "https://prod-00.northcentralus.logic.azure.com/workflows/905d604fdd334accb3602a9161315372/triggers/When_an_HTTP_request_is_received/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2FWhen_an_HTTP_request_is_received%2Frun&sv=1.0&sig=FNcE-ewZws-Dh6opG7bRRd8FF1yi2YiwQNMxQxtJYT8";

  try {

    console.log("=== SEND DATA ===", data);

    const res = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    console.log("=== HTTP STATUS ===", res.status);
    console.log("OK:", res.ok);

    console.log("=== HEADERS ===");
    for (const [k, v] of res.headers.entries()) {
      console.log(k + ":", v);
    }

    const raw = await res.text();
    console.log("=== RAW RESPONSE ===", raw);

    let result;

    try {
      result = JSON.parse(raw);
      console.log("=== PARSED RESULT ===", result);
    } catch (err) {
      console.error("JSON PARSE ERROR:", err);
      window.location.href = "result.html?status=error";
      return;
    }

    if (result?.status === "success") {
      window.location.href = "result.html?status=success";
    } else {
      window.location.href = "result.html?status=error";
    }

  } catch (err) {
    console.error("FETCH ERROR:", err);
    window.location.href = "result.html?status=error";
  }

});

</script>

</body>
</html>
