<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>申請データ一覧</title>
<style>
body {
  font-family: "Segoe UI", "Meiryo", sans-serif;
  background-color: #f3f2f1;
  padding: 20px;
}

.container {
max-width: 1000px;
margin: auto;
background: #fff;
padding: 20px;
}

h1 {
margin-bottom: 20px;
}

table {
width: 100%;
border-collapse: collapse;
}

th, td {
border: 1px solid #ccc;
padding: 10px;
text-align: left;
}

th {
background-color: #0078d4;
color: white;
} </style>

</head>
<body>

<div class="container">
  <h1>申請データ一覧</h1>
  <table id="dataTable">
    <thead>
      <tr>
        <th>申請者名</th>
        <th>メール</th>
        <th>部署</th>
        <th>区分</th>
        <th>プロジェクト</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
async function loadData() {
  try {
    const res = await fetch("Logic App URL", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({})
    });

    const data = await res.json();

    const tbody = document.querySelector("#dataTable tbody");
    tbody.innerHTML = "";

    data.forEach(item => {
      tbody.innerHTML += `
        <tr>
          <td>${item.applicantName || ""}</td>
          <td>${item.email || ""}</td>
          <td>${item.department || ""}</td>
          <td>${item.category || ""}</td>
          <td>${item.projectName || ""}</td>
        </tr>
      `;
    });

  } catch (err) {
    console.error(err);
    alert("取得エラーなの…💦");
  }
}

loadData();
</script>

</body>
</html>
